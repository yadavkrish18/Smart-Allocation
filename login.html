<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAllocation | Authenticate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0f1e;
            background-image: 
                radial-gradient(at 20% 20%, rgba(20, 184, 166, 0.06) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(20, 184, 166, 0.04) 0px, transparent 50%);
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Roles Card Custom Styles */
        .role-card {
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .role-card:hover {
            background: rgba(15, 23, 42, 0.9);
            border-color: #14b8a6;
            transform: translateY(-4px);
        }

        .role-icon-bg {
            background: rgba(20, 184, 166, 0.1);
            color: #14b8a6;
        }
    </style>
</head>

                    </div>
                </div>

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>

                <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-bold text-gray-600 bg-transparent px-2">OR</div>

                    <div class="input-modern-container">

                    <div class="input-modern-container">

    <footer class="mt-8 text-[10px] text-gray-600 font-medium uppercase tracking-[0.2em]">

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script>
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const statusEl = document.getElementById('auth-status');
        const headerSubtitle = document.getElementById('header-subtitle');

        function showSection(section) {
            const sections = ['signin', 'role-selection', 'signup-ngo', 'signup-volunteer', 'recovery'];
            sections.forEach(s => document.getElementById(`section-${s}`).classList.add('hidden'));
            document.getElementById(`section-${section}`).classList.remove('hidden');
            document.getElementById(`section-${section}`).classList.add('fade-in');

            if (section === 'signin') {
                headerSubtitle.textContent = "Data-driven volunteer coordination";
            } else {
                headerSubtitle.textContent = "Join our community";
            }
        }

        function selectRole(role) {
            if (role === 'NGO') showSection('signup-ngo');
            else showSection('signup-volunteer');
        }

        async function handleAuth(e, mode, role = null) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            setLoadingState(submitBtn, true);

            try {
                if (mode === 'login') {
                    const email = document.getElementById('signin-email').value;
                    const password = document.getElementById('signin-password').value;
                    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    showToast("Authenticated. Redirecting...");
                    setTimeout(() => window.location.href = 'index.html', 800);
                } else {
                    const email = document.getElementById(`${role.toLowerCase()}-email`).value.trim();
                    const password = document.getElementById(`${role.toLowerCase()}-password`).value;
                    const confirm = document.getElementById(`${role.toLowerCase()}-confirm-password`).value;
                    const name = document.getElementById(`${role.toLowerCase()}-name`).value.trim();
                    let category = null;
                    if (role === 'NGO') {
                        category = document.getElementById('ngo-category').value;
                        if (!category) throw new Error("Please select an organization category.");
                    }

                    if (!name) throw new Error("Please enter your full name or organization name.");
                    if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) throw new Error("Invalid email format.");
                    if (password.length < 6) throw new Error("Password must be at least 6 characters.");
                    if (password !== confirm) throw new Error("Passwords do not match.");

                    const { data: signUpData, error } = await supabaseClient.auth.signUp({ 
                        email, password, 
                        options: { data: { role, full_name: name, category: category } }
                    });
                    if (error) throw error;

                    // Persist profile details immediately so post-login setup doesn't ask again.
                    const signedUpUser = signUpData?.user;
                    if (signedUpUser) {
                        const { error: profileWriteError } = await supabaseClient.from('profiles').upsert({
                            id: signedUpUser.id,
                            role,
                            full_name: name,
                            category: category
                        }, { onConflict: 'id' });
                        if (profileWriteError) console.warn('Profile bootstrap write skipped:', profileWriteError.message);

                        if (role === 'NGO') {
                            const { error: ngoWriteError } = await supabaseClient.from('ngo_details').upsert({
                                user_id: signedUpUser.id,
                                org_name: name,
                                contact_name: name,
                                org_type: category || 'General'
                            }, { onConflict: 'user_id' });
                            if (ngoWriteError) console.warn('NGO bootstrap write skipped:', ngoWriteError.message);
                        }
                    }

                    if (signUpData?.session) {
                        showToast("Account Created. Securely Routing...");
                        setTimeout(() => window.location.href = 'index.html', 800);
                    } else {
                        showToast("Account created. Please verify your email, then sign in.");
                        showSection('signin');
                        document.getElementById('signin-email').value = email;
                        document.getElementById('signin-password').value = '';
                    }
                }
            } catch (err) {
                let msg = err.message;
                if (mode === 'login') {
                    if (msg.toLowerCase().includes('not found') || msg.toLowerCase().includes('no user')) {
                        msg = "This email is not registered. Please create an account.";
                    } else if (msg.includes('Invalid') || msg.includes('credentials')) {
                        msg = "Incorrect email or password. Please try again.";
                    }
                } else if (mode === 'signup') {
                    if (msg.includes('already registered')) {
                        msg = "An account with this email already exists. Please sign in.";
                    }
                }
                showToast(msg, true);
                setLoadingState(submitBtn, false);
            }
        }

        document.getElementById('signin-form').onsubmit = (e) => handleAuth(e, 'login');
        document.getElementById('signup-ngo-form').onsubmit = (e) => handleAuth(e, 'signup', 'NGO');
        document.getElementById('signup-vol-form').onsubmit = (e) => handleAuth(e, 'signup', 'Volunteer');

        document.getElementById('recovery-form').onsubmit = handleRecovery;

        async function handleRecovery(e) {
            e.preventDefault();
            const btn = document.getElementById('recovery-btn');
            const email = document.getElementById('recovery-email').value;
            const newPass = document.getElementById('new-password').value;

            setLoadingState(btn, true);

            try {
                if (window._isUpdateMode) {
                    if (!newPass || newPass.length < 6) throw new Error("Password must be at least 6 characters.");
                    const { error } = await supabaseClient.auth.updateUser({ password: newPass });
                    if (error) throw error;
                    showToast("Password updated! Logging you in...");
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/login.html',
                    });
                    if (error) throw error;
                    showToast("Check your email for the reset link!", false);
                }
            } catch (err) {
                showToast(err.message, true);
            } finally {
                setLoadingState(btn, false);
            }
        }

        // Detect if user landed here via a password reset link
        window.addEventListener('load', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && window.location.hash.includes('type=recovery')) {
                showSection('recovery');
                window._isUpdateMode = true;
                document.getElementById('update-pass-fields').classList.remove('hidden');
                document.getElementById('recovery-btn').textContent = "Update Password";
                document.getElementById('recovery-email').value = session.user.email;
                document.getElementById('recovery-email').disabled = true;
            }
        });
    </script>
</body>
</html>
